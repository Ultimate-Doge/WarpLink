<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WarpLink Studio Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        body {
            background: #2d2d2d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        /* Your exact 5px solid red border framework */
        .popup-border {
            border: 5px solid #ff4d4d;
            width: 278px;
            height: 473px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #2d2d2d;
        }
        /* Your exact custom popup size & dark palette background */
        .container {
            width: 270px;
            height: 465px;
            background: #1f1f1f;
            border-radius: 10px;
            padding: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .tabs {
            display: flex;
            justify-content: space-between;
            gap: 6px;
            margin-bottom: 14px;
        }
        .tab {
            flex: 1;
            border: none;
            background: #f2f2f2;
            color: #000;
            border-radius: 999px;
            padding: 7px 0;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .tab:hover {
            background: #ffffff;
        }
        .tab.active {
            background: #ff4d4d;
            color: white;
        }
        .content-area {
            flex-grow: 1;
            color: white;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .page-panel {
            display: none;
            flex-direction: column;
            gap: 12px;
            text-align: left;
        }
        .page-panel.active {
            display: flex;
        }
        .page-panel h2 {
            font-size: 24px;
            color: #ffffff;
        }
        .page-panel p {
            font-size: 13px;
            color: #d8d8d8;
        }
        /* FORM CONTROLS & SIDE-BY-SIDE GRID ELEMENTS */
        .input-box {
            background: #2d2d2d;
            border: 1px solid #4c97ff;
            color: white;
            border-radius: 4px;
            padding: 8px;
            font-size: 12px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }
        .action-btn {
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
            transition: opacity 0.2s;
        }
        .action-btn:hover {
            opacity: 0.9;
        }
        #wl-status-log {
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            margin-top: 4px;
            color: #a0aec0;
        }
    </style>
</head>
<body>

<div class="popup-border">
    <div class="container">
        
        <!-- Scratch Addons Style Tab Selector Row -->
        <div class="tabs">
            <button class="tab active" id="btn-host">Host</button>
            <button class="tab" id="btn-ext">Extensions</button>
            <button class="tab" id="btn-social">Social</button>
        </div>

        <div class="content-area">
            
            <!-- TAB 1: HOST WORKSPACE (Create & Join Forms Side-by-Side) -->
            <div class="page-panel active" id="panel-host">
                <h2>Multiplayer Engine</h2>
                <p>Enter a unique room code text string below to link up with your friend.</p>
                
                <input id="wl-room-input" class="input-box" type="text" placeholder="Enter Room Code...">
                
                <!-- Side-by-side room management grid buttons -->
                <div style="display: flex; gap: 6px; width: 100%;">
                    <button id="wl-host-btn" class="action-btn" style="background: #4c97ff; flex: 1;">👑 Create</button>
                    <button id="wl-join-btn" class="action-btn" style="background: #2ecc71; flex: 1;">🔌 Join</button>
                </div>
                
                <div id="wl-status-log">Status: Offline</div>
            </div>

            <!-- TAB 2: EXTENSIONS PANELS PLUGINS -->
            <div class="page-panel" id="panel-ext">
                <h2>Extensions</h2>
                <p>Your custom Webflow extension canvas controls go right inside here.</p>
            </div>

            <!-- TAB 3: SOCIAL & DEPLOY CHANNELS -->
            <div class="page-panel" id="panel-social">
                <h2>Social</h2>
                <p>Links, chat windows, and Scratch profile publishing forms go inside here.</p>
            </div>

        </div>
    </div>
</div>

<script src="main.js"></script>
</body>
</html>
