<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WarpLink Matchmaker Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        body {
            background: #2d2d2d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        /* Your exact 5px solid red outer border layout */
        .popup-border {
            border: 5px solid #ff4d4d;
            width: 278px;
            height: 473px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #2d2d2d;
        }
        /* Your exact custom viewport dimensions & dark theme background palette */
        .container {
            width: 270px;
            height: 465px;
            background: #1f1f1f;
            border-radius: 10px;
            padding: 24px 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .header-section {
            text-align: center;
            margin-top: 10px;
        }
        .header-section h2 {
            font-size: 28px;
            color: #ffffff !important;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .header-section p {
            font-size: 14px;
            color: #d8d8d8;
            line-height: 1.4;
        }
        .form-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
        }
        .input-label {
            font-size: 11px;
            color: #ff4d4d;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .room-input {
            background: #2d2d2d;
            border: 1px solid #4c97ff; /* Clean Scratch Blue outline */
            color: white;
            border-radius: 6px;
            padding: 12px;
            font-size: 14px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
        }
        .button-grid {
            display: flex;
            gap: 8px;
            width: 100%;
        }
        .action-btn {
            color: white;
            border: none;
            padding: 12px 0;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            flex: 1;
            box-sizing: border-box;
            transition: background 0.2s, transform 0.1s;
        }
        .action-btn:active {
            transform: scale(0.98);
        }
        #wl-host-btn {
            background: #4c97ff;
        }
        #wl-host-btn:hover {
            background: #357ae8;
        }
        #wl-join-btn {
            background: #2ecc71;
        }
        #wl-join-btn:hover {
            background: #27ae60;
        }
        #wl-status-log {
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            color: #a0aec0;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="popup-border">
    <div class="container">
        
        <div class="header-section">
            <h2>WarpLink</h2>
            <p>Connect and synchronize with your studio room across the web.</p>
        </div>

        <div class="form-section">
            <span class="input-label">Target Room Code String:</span>
            <input id="wl-room-input" class="room-input" type="text" placeholder="Enter Room Name...">
            
            <div class="button-grid">
                <button id="wl-host-btn" class="action-btn">👑 Create</button>
                <button id="wl-join-btn" class="action-btn">🔌 Join</button>
            </div>
        </div>
        
        <div id="wl-status-log">Status: Disconnected</div>

    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        let webSocketLine = null;
        const statusLog = document.getElementById('wl-status-log');
        const roomInputField = document.getElementById('wl-room-input');

        function connectToNodeServer(roomId, roleName) {
            // 👑 HOOK THIS LINE DIRECTLY TO YOUR RUNNING CLOUD SERVICE LINK:
            // Swap this text string out with your real address handle (use wss:// instead of https://)
            const BACKEND_URL = "wss://://onrender.com";

            if (webSocketLine) {
                webSocketLine.close();
            }

            if (statusLog) {
                statusLog.innerText = "Status: Handshaking with Node server...";
                statusLog.style.color = "#f1c40f";
            }

            webSocketLine = new WebSocket(BACKEND_URL);

            webSocketLine.onopen = () => {
                if (statusLog) {
                    statusLog.innerText = `Status: Live! (${roleName})`;
                    statusLog.style.color = "#2ecc71";
                }
                // Send registration packet up the pipe to the server
                webSocketLine.send(JSON.stringify({ type: 'join', roomId: roomId }));
                alert(`🎉 Connected to Node Server!\n\nRoom Channel: ${roomId}\nRole: ${roleName}`);
            };

            webSocketLine.onmessage = (event) => {
                const incoming = JSON.parse(event.data);
                console.log("[WarpLink Client] Data packet arrived:", incoming);
            };

            webSocketLine.onclose = () => {
                if (statusLog) {
                    statusLog.innerText = "Status: Disconnected";
                    statusLog.style.color = "#e74c3c";
                }
            };

            webSocketLine.onerror = () => {
                if (statusLog) {
                    statusLog.innerText = "Status: Server Link Error";
                    statusLog.style.color = "#e74c3c";
                }
                alert("⚠️ Connection failed. Check that your Node application is completely active!");
            };
        }

        const hostBtn = document.getElementById('wl-host-btn');
        const joinBtn = document.getElementById('wl-join-btn');

        if (hostBtn) {
            hostBtn.onclick = () => {
                const code = roomInputField ? roomInputField.value.trim() : '';
                if (!code) return alert("Please specify a room name code parameter first!");
                connectToNodeServer(code, "Host Master");
            };
        }

        if (joinBtn) {
            joinBtn.onclick = () => {
                const code = roomInputField ? roomInputField.value.trim() : '';
                if (!code) return alert("Please specify a room name code parameter first!");
                connectToNodeServer(code, "Client Joiner");
            };
        }
    });
</script>
</body>
</html>
