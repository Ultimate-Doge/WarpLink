<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WarpLink Studio Multi-Matchmaker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        body {
            background: #2d2d2d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        /* Your exact 5px solid red outer border layout */
        .popup-border {
            border: 5px solid #ff4d4d;
            width: 278px;
            height: 473px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #2d2d2d;
        }
        /* Your exact custom popup dimensions & dark background */
        .container {
            width: 270px;
            height: 465px;
            background: #1f1f1f;
            border-radius: 10px;
            padding: 24px 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .header-section {
            text-align: center;
            margin-top: 10px;
        }
        /* Forces your top line text to be bright white instead of black */
        .header-section h2 {
            font-size: 28px;
            color: #ffffff !important;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .header-section p {
            font-size: 14px;
            color: #d8d8d8;
            line-height: 1.4;
        }
        .form-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
        }
        .input-label {
            font-size: 11px;
            color: #ff4d4d;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .room-input {
            background: #2d2d2d;
            border: 1px solid #4c97ff; /* Clean Scratch Blue outline */
            color: white;
            border-radius: 6px;
            padding: 12px;
            font-size: 14px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
        }
        .button-grid {
            display: flex;
            gap: 8px;
            width: 100%;
        }
        .action-btn {
            color: white;
            border: none;
            padding: 12px 0;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            flex: 1;
            box-sizing: border-box;
            transition: background 0.2s, transform 0.1s;
        }
        .action-btn:active {
            transform: scale(0.98);
        }
        #btn-host {
            background: #4c97ff;
        }
        #btn-host:hover {
            background: #357ae8;
        }
        #btn-join {
            background: #2ecc71;
        }
        #btn-join:hover {
            background: #27ae60;
        }
        #wl-status-log {
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            color: #a0aec0;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="popup-border">
    <div class="container">
        
        <!-- App Title Header Block -->
        <div class="header-section">
            <h2>WarpLink</h2>
            <p>Connect and synchronize with your studio room across the web.</p>
        </div>

        <!-- Central Input Box and Buttons Matrix -->
        <div class="form-section">
            <span class="input-label">Target Room Code String:</span>
            <input id="wl-room-input" class="room-input" type="text" placeholder="Enter Room Name...">
            
            <div class="button-grid">
                <button id="wl-host-btn" class="action-btn">👑 Create</button>
                <button id="wl-join-btn" class="action-btn">🔌 Join</button>
            </div>
        </div>
        
        <!-- Continuous Cloud Status Logger -->
        <div id="wl-status-log">Status: Disconnected</div>

    </div>
</div>

<script src="main.js"></script>
</body>
</html>
