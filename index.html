<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WarpLink Matchmaker Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        body {
            background: #2d2d2d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        /* Your exact 5px solid red outer border layout */
        .popup-border {
            border: 5px solid #ff4d4d;
            width: 278px;
            height: 473px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #2d2d2d;
        }
        /* Your exact custom viewport dimensions & dark theme background palette */
        .container {
            width: 270px;
            height: 465px;
            background: #1f1f1f;
            border-radius: 10px;
            padding: 24px 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .header-section {
            text-align: center;
            margin-top: 10px;
        }
        .header-section h2 {
            font-size: 28px;
            color: #ffffff !important;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .header-section p {
            font-size: 14px;
            color: #d8d8d8;
            line-height: 1.4;
        }
        .form-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
            align-items: center;
        }
        .input-label {
            font-size: 11px;
            color: #ff4d4d;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        #wl-status-log {
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            color: #f1c40f;
            margin-bottom: 30px;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 6px;
            width: 100%;
            border: 1px solid #223142;
        }
    </style>
</head>
<body>

<div class="popup-border">
    <div class="container">
        
        <div class="header-section">
            <h2>WarpLink</h2>
            <p>Connect and synchronize with your studio room across the web.</p>
        </div>

        <!-- Hyper-focused interface layout: Inputs and manual buttons removed -->
        <div class="form-section">
            <span class="input-label">Multiplayer Link State</span>
            <div id="wl-status-log">Status: Connecting...</div>
        </div>
        
        <div style="font-size: 10px; color: #a0aec0; text-align: center; margin-bottom: 10px;">
            WarpLink Serverless Peer-to-Peer Gateway
        </div>

    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const statusLog = document.getElementById('wl-status-log');

        // 👑 CHROME/WEB AUTO-CONNECT HANDSHAKE ROUTINE
        function bootAutomaticCloudTunnel() {
            // 👑 UPDATE THIS: Paste your running Render link handle here (use wss:// instead of https://)
            const BACKEND_URL = "https://warplink.onrender.com";

            if (statusLog) {
                statusLog.innerText = "Status: Tuning data line...";
                statusLog.style.color = "#f1c40f";
            }

            console.log("[WarpLink Web] Auto-connecting to server context: " + BACKEND_URL);
            const webSocketLine = new WebSocket(BACKEND_URL);

            webSocketLine.onopen = () => {
                if (statusLog) {
                    statusLog.innerText = "Status: Connected Live!";
                    statusLog.style.color = "#2ecc71";
                }
                
                // Automatically register into a universal master sandbox channel
                webSocketLine.send(JSON.stringify({ type: 'join', roomId: 'global-studio-sync' }));
            };

            webSocketLine.onmessage = (event) => {
                try {
                    const incomingPacket = JSON.parse(event.data);
                    console.log("[WarpLink Client] Live coordinates data arrived:", incomingPacket);
                } catch(e) {}
            };

            webSocketLine.onclose = () => {
                if (statusLog) {
                    statusLog.innerText = "Status: Reconnecting...";
                    statusLog.style.color = "#e74c3c";
                }
                // Auto-retry connection string loops if server drops
                setTimeout(bootAutomaticCloudTunnel, 3000);
            };

            webSocketLine.onerror = () => {
                if (statusLog) {
                    statusLog.innerText = "Status: Server Offline";
                    statusLog.style.color = "#e74c3c";
                }
            };
        }

        // 🚀 Execute the automatic backend tunnel connection instantly on page bootup
        bootAutomaticCloudTunnel();
    });
</script>
</body>
</html>
